<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pavlov Cat</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <div class="header-brand">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="36" height="36" aria-hidden="true">
          <!-- left ear -->
          <polygon points="8,19 13,5 19,17" fill="currentColor"/>
          <!-- right ear -->
          <polygon points="32,19 27,5 21,17" fill="currentColor"/>
          <!-- head fill -->
          <circle cx="20" cy="25" r="14" fill="currentColor" opacity="0.12"/>
          <!-- head outline -->
          <circle cx="20" cy="25" r="14" fill="none" stroke="currentColor" stroke-width="2"/>
          <!-- eyes -->
          <ellipse cx="15" cy="23" rx="2" ry="2.2" fill="currentColor"/>
          <ellipse cx="25" cy="23" rx="2" ry="2.2" fill="currentColor"/>
          <!-- nose -->
          <path d="M19,28 L20,26.5 L21,28Z" fill="currentColor"/>
          <!-- mouth -->
          <path d="M20,28 C18.5,30 17.5,30 17.5,29 M20,28 C21.5,30 22.5,30 22.5,29" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
        </svg>
        <h1>Pavlov Cat</h1>
      </div>
    </header>

    <section id="config">
      <div class="config-row">
        <div class="config-group">
          <span class="config-label">把位</span>
          <div class="toggle-group" id="position-toggles">
            <button class="toggle active" data-value="1">一把位</button>
            <button class="toggle" data-value="2">二把位</button>
            <button class="toggle" data-value="3">三把位</button>
          </div>
        </div>
        <div class="config-group">
          <span class="config-label">弦</span>
          <div class="toggle-group" id="string-toggles">
            <button class="toggle active" data-value="G">G弦</button>
            <button class="toggle active" data-value="D">D弦</button>
            <button class="toggle active" data-value="A">A弦</button>
            <button class="toggle active" data-value="E">E弦</button>
          </div>
        </div>
        <div class="config-group">
          <span class="config-label">音频</span>
          <button id="pick-audio-dir" class="toggle">选择本地音频文件夹</button>
          <span id="audio-dir-name" class="config-label" style="font-style:italic"></span>
          <details class="audio-help">
            <summary>使用说明</summary>
            <ul>
              <li>用本地音频文件覆盖播放的声音</li>
              <li>文件命名：<code>音名.扩展名</code>，如 <code>A4.mp3</code>、<code>G3.wav</code></li>
              <li>支持格式：mp3、m4a、ogg、wav</li>
              <li>音名范围：G3 A3 B3 C4 D4 E4 F4 F#4 G4 A4 B4 C5 C#5 D5 E5 F5 F#5 G5 G#5 A5 B5</li>
              <li>刷新页面后需重新选择文件夹（浏览器限制）</li>
              <li>仅支持 Chrome / Edge，Safari 不支持</li>
            </ul>
          </details>
        </div>
      </div>
    </section>

    <nav id="tabs">
      <button class="tab active" data-mode="quiz">出题模式</button>
      <button class="tab" data-mode="practice">练习模式</button>
    </nav>

    <main>
      <!-- Quiz Mode -->
      <div id="quiz-panel" class="panel active">
        <div class="quiz-type-row">
          <span class="config-label">题型</span>
          <select id="quiz-type">
            <option value="note-to-fingering">音名 → 把位/弦/指</option>
            <option value="fingering-to-note">把位/弦/指 → 音名</option>
            <option value="staff-to-note">五线谱 → 音名</option>
            <option value="sound-to-note">声音 → 音名</option>
          </select>
        </div>

        <div class="quiz-question-area">
          <div id="quiz-question-text" class="question-text"></div>
          <canvas id="quiz-canvas" width="340" height="200"></canvas>
          <button id="quiz-play-btn" class="play-btn" style="display:none">▶ 播放</button>
        </div>

        <div id="quiz-options" class="options-grid"></div>

        <div id="quiz-feedback" class="feedback"></div>

        <div class="quiz-footer">
          <div id="quiz-score" class="score">0 / 0</div>
          <button id="next-btn" class="btn-primary">下一题</button>
        </div>
      </div>

      <!-- Practice Mode -->
      <div id="practice-panel" class="panel">
        <div id="note-palette" class="note-palette"></div>
        <div class="practice-display">
          <canvas id="practice-canvas" width="340" height="200"></canvas>
          <div class="practice-info">
            <div id="practice-note-name" class="big-note"></div>
            <div id="practice-fingerings" class="fingering-list"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
